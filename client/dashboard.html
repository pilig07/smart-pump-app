<!DOCTYPE html>
<html>

<head>

    <title>User Profile</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>
    <nav class="navbar  nav">
        <div></div>
        <div class="rect">

        </div>
        <div class=" ">



            <button class="navbar-toggler " type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">

                <span class="navbar-toggler-icon"></span>

            </button>


        </div>

    </nav>
    <div class="container mt-5">

        <div class="">

            <div class="card-body text-center">

                <img id="userImage" src="../assets/simple-user-default-icon-free-png.png" class="rounded-circle mb-3">

                <h3 id="userName"></h3>

                <div class="mt-4">

                    <button class="btn btn-success me-2" onclick="toggleBalance()">BALANCE</button>
                    <button class="btn btn-secondary" onclick="toggleEidtSection()">EDIT</button>

                </div>

                <div style="display: none;" class="mt-4 " id="balance">
                    <h4>Balance</h4>

                    <p id="balance" class="fs-3 text-primary"></p>

                </div>

                <div style="display: none;" class="mt-4" id="edit">
                    <h4>Edit Details</h4>

                    <div class="row">
                        <div class="col-md-6">
                            <label>First Name</label>
                            <input id="firstName" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label>Last Name</label>
                            <input id="lastName" class="form-control">
                        </div>
                        <div class="col-md-6">
                            <label>Phone</label>
                            <input id="phone" class="form-control">
                        </div>

                        <div class="col-md-6">
                            <label>Address</label>
                            <input id="address" class="form-control">
                        </div>

                    </div>
                    <button class="btn btn-primary mt-4" onclick="updateUser()">
                        Update
                    </button>

                </div>



            </div>

        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>

</body>

</html>
